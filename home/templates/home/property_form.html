{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Contact - Alfa Mortgage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            min-height: 100vh;
            background-color: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 2rem 1rem;
        }

        /* Outer Card */
        .mortgage-card {
            display: flex;
            width: 100%;
            max-width: 780px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            background: #fff;
        }

        /* Left Red Sidebar */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #e30613;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 28px 24px 36px;
        }

        .sidebar-logo {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        .sidebar-logo img {
            width: 48px;
            height: auto;
            filter: brightness(0) invert(1);
        }

        .sidebar-title {
            color: #fff;
            font-size: 2.1rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-top: 12px;
        }

        /* Success Content */
        .success-content {
            flex: 1;
            padding: 40px 36px 40px;
            background: #fff;
            position: relative;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #555;
            font-size: 0.85rem;
            text-decoration: none;
            margin-bottom: 6px;
            transition: color 0.2s;
        }
        
        .back-link:hover { color: #e30613; }
        .back-link svg { width: 16px; height: 16px; }

        .success-box {
            text-align: center;
            max-width: 460px;
            margin: 0 auto;
        }

        .success-box h1 {
            font-size: 2.35rem;
            font-weight: 700;
            color: #e30613;
            margin-bottom: 1.2rem;
        }

        .success-box p {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        /* Seller Contact Box */
        .contact-box {
            background: #f8f9fa;
            border: 2px solid #e30613;
            border-radius: 12px;
            padding: 26px 20px;
            margin-bottom: 2.5rem;
        }

        .contact-box label {
            font-size: 0.83rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        .contact-number {
            font-size: 1.68rem;
            font-weight: 700;
            color: #e30613;
            letter-spacing: 2px;
            word-break: break-all;
        }

        /* Close Button */
        .btn-close {
            display: block;
            width: 65%;
            margin: 0 auto;
            background: #e30613;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #c20511;
        }

        .btn-close:active {
            transform: scale(0.97);
        }

        /* Responsive */
        @media (max-width: 580px) {
            .sidebar { display: none; }
            .success-content { padding: 32px 20px; }
            .btn-close { width: 100%; }
        }
    </style>
</head>
<body>

<!-- SELLER CONTACT PAGE (Always show this) -->
<div class="mortgage-card">
    <!-- Left Red Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="{% static 'images/logo.png' %}" alt="Bank Alfalah Logo">
        </div>
        <div class="sidebar-title">Alfa<br>Mortgage</div>
    </div>

    <!-- Success Content -->
    <div class="success-content">
        <a href="{% url 'browse_properties' %}" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Back
        </a>

        <div class="success-box">
            <h1>Seller Contact</h1>
            <p>
                For inquiries about this property,<br>
                please contact the seller directly at:
            </p>

            <div class="contact-box">
                <label>Seller Contact Number</label>
                <div class="contact-number">{{ seller_number }}</div>
            </div>

            <button onclick="window.location.href='{% url 'browse_properties' %}'" class="btn-close">
                Back to Properties
            </button>
        </div>
    </div>
</div>

</body>
</html>
