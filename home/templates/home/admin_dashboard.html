<div class="container mt-5">
    <h2 class="mb-4">Alfa Mortgage - User Leads</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>City</th>
                        <th>Contact</th>
                        <th>CNIC</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in profiles %}
                    <tr>
                        <td>{{ p.user.username }}</td>
                        <td>{{ p.user.first_name }}</td>
                        <td>{{ p.city }}</td>
                        <td>{{ p.contact_no }}</td>
                        <td>{{ p.cnic }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center">No user data available.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
