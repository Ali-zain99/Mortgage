{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP verification - Alfa Mortgage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #141519;
            --text-secondary: #6b6f80;
            --surface: #ececee;
            --surface-otp-mobile: #e8e8ec;
            --gradient: linear-gradient(86.29deg, #000000 1.21%, #D30248 42.84%, #D30202 84.46%, #D34802 105.28%);
            --gradient-otp-mobile: linear-gradient(90deg, #2a1533 0%, #4a1a3d 28%, #c41e3a 72%, #e85a2a 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text-primary);
            background: #ffffff;
            overflow: hidden;
        }

        .signup-layout {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .left-visual {
            width: 58.33%;
            height: 100vh;
            position: relative;
            background-color: #0b1220;
            background-image:
                linear-gradient(
                    105deg,
                    rgba(0, 18, 40, 0.35) 0%,
                    rgba(0, 0, 0, 0.08) 38%,
                    rgba(0, 0, 0, 0.42) 100%
                ),
                url("{% static 'images/signup-hero-desktop.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .right-panel {
            width: 41.67%;
            height: 100vh;
            background-color: #ffffff;
            background-image:
                radial-gradient(
                    95% 72% at 106% -6%,
                    rgba(211, 2, 2, 0.07) 0%,
                    transparent 52%
                ),
                radial-gradient(
                    125% 92% at 100% 0%,
                    rgba(211, 2, 72, 0.12) 0%,
                    rgba(255, 242, 246, 0.38) 32%,
                    rgba(255, 255, 255, 0) 64%
                );
            display: flex;
            justify-content: center;
            padding: clamp(14px, 4vh, 56px) clamp(16px, 2.8vw, 58px);
        }

        .signup-content {
            width: 100%;
            max-width: 522px;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 2.2vh, 28px);
            overflow: auto;
        }

        .top-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            align-items: start;
            column-gap: 16px;
        }

        .cell-back {
            grid-column: 1;
            grid-row: 1;
        }

        .cell-title {
            grid-column: 1;
            grid-row: 2;
            margin-top: 8px;
        }

        .cell-logo {
            grid-column: 2;
            grid-row: 1 / span 2;
            justify-self: end;
            align-self: start;
        }

        .back-button {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
        }

        .back-button svg {
            width: 32px;
            height: 32px;
            display: block;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            line-height: 40px;
            letter-spacing: -0.5px;
        }

        .brand-logo {
            width: 159px;
            height: 31px;
            object-fit: contain;
            margin-top: 8px;
        }

        .otp-instruction {
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .otp-instruction .email-mask {
            font-weight: 600;
            color: var(--text-primary);
        }

        .otp-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .otp-row {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 100%;
        }

        .otp-digit {
            width: 48px;
            height: 56px;
            flex: 0 0 auto;
            border: 1px solid transparent;
            border-radius: 10px;
            background: var(--surface);
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .otp-digit::placeholder {
            color: #a4a8b5;
            font-weight: 400;
            font-size: 18px;
        }

        .otp-digit:focus {
            border-color: #d30248;
            background: #ffffff;
        }

        .resend-row {
            font-size: 15px;
            line-height: 22px;
            letter-spacing: -0.35px;
            color: var(--text-primary);
        }

        .resend-btn {
            border: none;
            background: none;
            padding: 0;
            font: inherit;
            color: #d34802;
            cursor: pointer;
            text-decoration: none;
        }

        .resend-btn:disabled {
            color: #d34802;
            opacity: 0.55;
            cursor: not-allowed;
        }

        .resend-btn:not(:disabled):hover {
            text-decoration: underline;
        }

        .signup-button {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: var(--gradient);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            min-height: 48px;
        }

        .signup-button:disabled {
            opacity: 0.68;
            cursor: not-allowed;
        }

        .btn-label-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
        }

        .btn-arrow {
            width: 24px;
            height: 24px;
            display: block;
        }

        .error-msg {
            display: none;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 20px;
            border: 1px solid rgba(211, 2, 2, 0.2);
            background: rgba(211, 2, 2, 0.08);
            color: #a1001b;
        }

        .error-msg.visible {
            display: block;
        }

        @media (max-width: 1199px) {
            .left-visual {
                display: none;
            }

            .right-panel {
                width: 100%;
                background: linear-gradient(180deg, #f0d4dc 0%, #f5e4ea 14%, #faf5f7 38%, #ffffff 72%);
                height: 100vh;
                min-height: 100dvh;
                padding: max(12px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
            }

            .signup-content {
                max-width: 540px;
                width: 100%;
                margin: 0 auto;
                min-height: calc(100dvh - 32px);
                gap: 20px;
                display: flex;
                flex-direction: column;
            }

            .header-row {
                grid-template-columns: auto 1fr;
                grid-template-rows: auto auto;
                row-gap: 4px;
            }

            .cell-back {
                grid-column: 1;
                grid-row: 1;
            }

            .cell-logo {
                grid-column: 2;
                grid-row: 1;
                align-self: center;
            }

            .cell-title {
                grid-column: 1 / -1;
                grid-row: 2;
                margin-top: 16px;
            }

            .title {
                font-size: 28px;
                line-height: 34px;
                letter-spacing: -0.6px;
            }

            .brand-logo {
                margin-top: 0;
                width: 140px;
                height: auto;
                max-height: 28px;
            }

            .otp-instruction {
                font-size: 15px;
                line-height: 22px;
                color: #3a3d46;
            }

            .otp-form {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 24px;
                min-height: 0;
            }

            .signup-button {
                margin-top: auto;
                border-radius: 999px;
                min-height: 52px;
                padding: 14px 22px;
                background: var(--gradient-otp-mobile);
                box-shadow: 0 8px 24px rgba(42, 21, 51, 0.18);
            }

            .otp-digit {
                flex: 1 1 0;
                min-width: 36px;
                max-width: 52px;
                width: 100%;
                aspect-ratio: 1;
                height: auto;
                border-radius: 8px;
                background: var(--surface-otp-mobile);
                font-size: 20px;
            }

            .otp-digit::placeholder {
                color: #9a9daa;
            }

            .otp-row {
                gap: clamp(6px, 2vw, 10px);
                justify-content: space-between;
            }
        }

        @media (max-width: 767px) {
            .title {
                font-size: 26px;
                line-height: 32px;
            }

            .otp-digit {
                max-width: 48px;
                min-width: 34px;
                font-size: 18px;
            }
        }

        @media (max-width: 400px) {
            .otp-digit {
                max-width: 44px;
                min-width: 32px;
                font-size: 17px;
            }

            .otp-row {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <main class="signup-layout">
        <section class="left-visual" aria-hidden="true"></section>

        <section class="right-panel">
            <div class="signup-content">
                <div class="top-area">
                    <div class="header-row">
                        <a class="back-button cell-back" href="{% url 'signup' %}" aria-label="Go back">
                            <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                                <path d="M12.76 7.90667L4.66667 16L12.76 24.0933" stroke="#141519" stroke-width="2.13333" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M27.3333 16H4.89333" stroke="#141519" stroke-width="2.13333" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                        <h1 class="title cell-title">OTP verification</h1>
                        <img
                            class="brand-logo cell-logo"
                            src="{% static 'images/logo.svg' %}"
                            alt="Alfa Mortgage"
                        >
                    </div>

                    <p class="otp-instruction" id="otpInstruction">
                        Enter the 6 digit verification code we just sent you on your email address
                        <span class="email-mask" id="maskedEmail">your email</span>
                    </p>
                </div>

                <div id="errorMsg" class="error-msg" role="alert"></div>

                <form id="otpForm" class="otp-form" novalidate>
                    <div class="otp-row" role="group" aria-label="One-time code">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" data-otp-index="0" aria-label="Digit 1" placeholder="–">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" data-otp-index="1" aria-label="Digit 2" placeholder="–">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" data-otp-index="2" aria-label="Digit 3" placeholder="–">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" data-otp-index="3" aria-label="Digit 4" placeholder="–">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" data-otp-index="4" aria-label="Digit 5" placeholder="–">
                        <input class="otp-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" data-otp-index="5" aria-label="Digit 6" placeholder="–">
                    </div>

                    <p class="resend-row">
                        If you didn't receive a code!
                        <button type="button" class="resend-btn" id="resendBtn" disabled>
                            Resend (<span id="resendSeconds">30</span>s)
                        </button>
                    </p>

                    <button type="submit" class="signup-button" id="continueBtn">
                        <span class="btn-label-wrap">
                            <span>Continue</span>
                        </span>
                        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12H19" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M13 6L19 12L13 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const maskEmail = (email) => {
            const trimmed = (email || "").trim();
            const at = trimmed.indexOf("@");
            if (at <= 0) return trimmed || "your email";
            const local = trimmed.slice(0, at);
            const domain = trimmed.slice(at + 1);
            if (local.length <= 2) {
                return `${local[0] || "*"}****@${domain}`;
            }
            if (local.length <= 4) {
                return `${local[0]}****@${domain}`;
            }
            return `${local.slice(0, 3)}****${local.slice(-1)}@${domain}`;
        };

        const saved = sessionStorage.getItem("signupDraft");
        let draft = null;
        try {
            draft = saved ? JSON.parse(saved) : null;
        } catch {
            draft = null;
        }

        const maskedEl = document.getElementById("maskedEmail");
        if (draft && draft.email) {
            maskedEl.textContent = maskEmail(draft.email);
        }

        const inputs = Array.from(document.querySelectorAll(".otp-digit"));
        const form = document.getElementById("otpForm");
        const errorMsg = document.getElementById("errorMsg");
        const resendBtn = document.getElementById("resendBtn");

        const showError = (msg) => {
            errorMsg.textContent = msg;
            errorMsg.classList.add("visible");
        };

        const hideError = () => {
            errorMsg.textContent = "";
            errorMsg.classList.remove("visible");
        };

        const getOtpValue = () => inputs.map((i) => i.value.replace(/\D/g, "")).join("");

        inputs[0]?.focus();

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                hideError();
                const v = input.value.replace(/\D/g, "").slice(-1);
                input.value = v;
                if (v && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
                if (e.key === "ArrowLeft" && index > 0) {
                    e.preventDefault();
                    inputs[index - 1].focus();
                }
                if (e.key === "ArrowRight" && index < inputs.length - 1) {
                    e.preventDefault();
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener("paste", (e) => {
                e.preventDefault();
                const text = (e.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0, 6);
                if (!text) return;
                text.split("").forEach((ch, i) => {
                    if (inputs[index + i]) inputs[index + i].value = ch;
                });
                const next = inputs[Math.min(index + text.length, inputs.length - 1)];
                next.focus();
            });
        });

        let timerId = null;

        const startResendTimer = () => {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
            let secondsLeft = 30;
            resendBtn.disabled = true;
            resendBtn.innerHTML = 'Resend (<span id="resendSeconds">30</span>s)';

            const secEl = () => document.getElementById("resendSeconds");

            timerId = setInterval(() => {
                secondsLeft -= 1;
                const el = secEl();
                if (el) el.textContent = String(Math.max(0, secondsLeft));
                if (secondsLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    resendBtn.disabled = false;
                    resendBtn.textContent = "Resend";
                }
            }, 1000);
        };

        resendBtn.addEventListener("click", () => {
            if (resendBtn.disabled) return;
            hideError();
            startResendTimer();
        });

        startResendTimer();

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            hideError();
            const code = getOtpValue();
            if (code.length !== 6) {
                showError("Please enter the full 6-digit code.");
                return;
            }
            sessionStorage.setItem("signupOtpVerified", "1");
            window.location.href = '{% url "signup_create_password" %}';
        });
    </script>
</body>
</html>
