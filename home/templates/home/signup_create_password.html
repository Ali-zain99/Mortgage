{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password - Alfa Mortgage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #141519;
            --text-secondary: #6b6f80;
            --surface: #f2f2f4;
            --surface-otp-mobile: #e8e8ec;
            --gradient: linear-gradient(86.29deg, #000000 1.21%, #D30248 42.84%, #D30202 84.46%, #D34802 105.28%);
            --gradient-otp-mobile: linear-gradient(90deg, #2a1533 0%, #4a1a3d 28%, #c41e3a 72%, #e85a2a 100%);
            --link-accent: #d34802;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text-primary);
            background: #ffffff;
            overflow: hidden;
        }

        .signup-layout {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .left-visual {
            width: 58.33%;
            height: 100vh;
            position: relative;
            background-color: #0b1220;
            background-image:
                linear-gradient(
                    105deg,
                    rgba(0, 18, 40, 0.35) 0%,
                    rgba(0, 0, 0, 0.08) 38%,
                    rgba(0, 0, 0, 0.42) 100%
                ),
                url("{% static 'images/signup-hero-desktop.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .right-panel {
            width: 41.67%;
            height: 100vh;
            background-color: #ffffff;
            background-image:
                radial-gradient(
                    95% 72% at 106% -6%,
                    rgba(211, 2, 2, 0.07) 0%,
                    transparent 52%
                ),
                radial-gradient(
                    125% 92% at 100% 0%,
                    rgba(211, 2, 72, 0.12) 0%,
                    rgba(255, 242, 246, 0.38) 32%,
                    rgba(255, 255, 255, 0) 64%
                );
            display: flex;
            justify-content: center;
            padding: clamp(14px, 4vh, 56px) clamp(16px, 2.8vw, 58px);
        }

        .signup-content {
            width: 100%;
            max-width: 522px;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 24px);
            overflow: auto;
        }

        .top-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: auto auto;
            align-items: start;
            column-gap: 16px;
        }

        .cell-back {
            grid-column: 1;
            grid-row: 1;
        }

        .cell-title {
            grid-column: 1;
            grid-row: 2;
            margin-top: 8px;
        }

        .cell-logo {
            grid-column: 2;
            grid-row: 1 / span 2;
            justify-self: end;
            align-self: start;
        }

        .back-button {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
        }

        .back-button svg {
            width: 32px;
            height: 32px;
            display: block;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            line-height: 40px;
            letter-spacing: -0.5px;
        }

        .brand-logo {
            width: 159px;
            height: 31px;
            object-fit: contain;
            margin-top: 8px;
        }

        .subtitle {
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .error-msg {
            display: none;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 20px;
            border: 1px solid rgba(211, 2, 2, 0.2);
            background: rgba(211, 2, 2, 0.08);
            color: #a1001b;
        }

        .error-msg.visible {
            display: block;
        }

        .form-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .input-wrap {
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrap:focus-within {
            border-color: #d30248;
            background: #ffffff;
        }

        .input-wrap input {
            flex: 1;
            min-width: 0;
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.25px;
            font-family: inherit;
        }

        .input-wrap input::placeholder {
            color: var(--text-secondary);
        }

        .toggle-visibility {
            border: none;
            background: transparent;
            color: #8a91a2;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            flex-shrink: 0;
        }

        .toggle-visibility svg {
            width: 22px;
            height: 22px;
            display: block;
        }

        .legal-copy {
            font-size: 14px;
            line-height: 22px;
            letter-spacing: -0.35px;
            color: var(--text-primary);
        }

        .legal-copy a {
            color: var(--link-accent);
            text-decoration: none;
            font-weight: 500;
        }

        .legal-copy a:hover {
            text-decoration: underline;
        }

        .signup-button {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: var(--gradient);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            min-height: 48px;
        }

        .signup-button:disabled {
            opacity: 0.68;
            cursor: not-allowed;
        }

        .btn-label-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
        }

        .btn-arrow {
            width: 24px;
            height: 24px;
            display: block;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1199px) {
            .left-visual {
                display: none;
            }

            .right-panel {
                width: 100%;
                background: linear-gradient(180deg, #f0d4dc 0%, #f5e4ea 14%, #faf5f7 38%, #ffffff 72%);
                height: 100vh;
                min-height: 100dvh;
                padding: max(12px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
            }

            .signup-content {
                max-width: 540px;
                width: 100%;
                margin: 0 auto;
                min-height: calc(100dvh - 32px);
                gap: 20px;
                display: flex;
                flex-direction: column;
            }

            .top-area {
                gap: 12px;
            }

            .header-row {
                grid-template-columns: auto 1fr;
                grid-template-rows: auto auto;
                row-gap: 4px;
            }

            .cell-back {
                grid-column: 1;
                grid-row: 1;
            }

            .cell-logo {
                grid-column: 2;
                grid-row: 1;
                align-self: center;
            }

            .cell-title {
                grid-column: 1 / -1;
                grid-row: 2;
                margin-top: 16px;
            }

            .title {
                font-size: 28px;
                line-height: 34px;
                letter-spacing: -0.6px;
            }

            .brand-logo {
                margin-top: 0;
                width: 140px;
                height: auto;
                max-height: 28px;
            }

            .subtitle {
                font-size: 15px;
                line-height: 22px;
                color: #3a3d46;
            }

            .input-wrap {
                background: var(--surface-otp-mobile);
                border-radius: 10px;
                padding: 12px 14px;
            }

            .legal-copy {
                font-size: 14px;
                line-height: 21px;
            }

            .form-area {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 20px;
                min-height: 0;
            }

            .form-fields {
                gap: 16px;
            }

            .signup-button {
                margin-top: auto;
                border-radius: 999px;
                min-height: 52px;
                padding: 14px 22px;
                background: var(--gradient-otp-mobile);
                box-shadow: 0 8px 24px rgba(42, 21, 51, 0.18);
            }
        }

        @media (max-width: 767px) {
            .title {
                font-size: 26px;
                line-height: 32px;
            }
        }
    </style>
</head>
<body>
    <main class="signup-layout">
        <section class="left-visual" aria-hidden="true"></section>

        <section class="right-panel">
            <div class="signup-content">
                <div class="top-area">
                    <div class="header-row">
                        <a class="back-button cell-back" href="{% url 'signup_continue' %}" aria-label="Go back">
                            <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                                <path d="M12.76 7.90667L4.66667 16L12.76 24.0933" stroke="#141519" stroke-width="2.13333" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M27.3333 16H4.89333" stroke="#141519" stroke-width="2.13333" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                        <h1 class="title cell-title">Create Password</h1>
                        <img
                            class="brand-logo cell-logo"
                            src="{% static 'images/logo.svg' %}"
                            alt="Alfa Mortgage"
                        >
                    </div>

                    <p class="subtitle">
                        To secure your account and login faster, choose a strong password you haven't used before.
                    </p>
                </div>

                <div id="errorMsg" class="error-msg" role="alert"></div>

                <form id="createPasswordForm" class="form-area" novalidate>
                    <div class="form-fields">
                        <div class="field">
                            <label class="label" for="password">Password *</label>
                            <div class="input-wrap">
                                <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Enter your password" required minlength="6">
                                <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Show password">
                                    <svg class="icon-hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                        <path d="M3 12C4.7 8.8 7.9 6.8 12 6.8C16.1 6.8 19.3 8.8 21 12C19.3 15.2 16.1 17.2 12 17.2C7.9 17.2 4.7 15.2 3 12Z" stroke="currentColor" stroke-width="1.4"/>
                                        <circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.4"/>
                                        <path d="M4 4L20 20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label" for="confirmPassword">Confirm password *</label>
                            <div class="input-wrap">
                                <input type="password" id="confirmPassword" name="confirm_password" autocomplete="new-password" placeholder="Enter password again" required minlength="6">
                                <button type="button" class="toggle-visibility" id="toggleConfirmPassword" aria-label="Show confirm password">
                                    <svg class="icon-hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                        <path d="M3 12C4.7 8.8 7.9 6.8 12 6.8C16.1 6.8 19.3 8.8 21 12C19.3 15.2 16.1 17.2 12 17.2C7.9 17.2 4.7 15.2 3 12Z" stroke="currentColor" stroke-width="1.4"/>
                                        <circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.4"/>
                                        <path d="M4 4L20 20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <p class="legal-copy">
                        By clicking continue you agree to our
                        <a href="{% url 'homepage' %}#terms" target="_blank" rel="noopener noreferrer">T&amp;Cs</a>
                        and
                        <a href="{% url 'homepage' %}#privacy" target="_blank" rel="noopener noreferrer">Privacy Policy</a>.
                    </p>

                    <button type="submit" class="signup-button" id="continueBtn">
                        <span class="btn-label-wrap">
                            <span id="continueBtnText">Continue</span>
                            <span class="loading-spinner" id="loadingSpinner" aria-hidden="true"></span>
                        </span>
                        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12H19" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M13 6L19 12L13 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbUovNi69LVu9IkmS1X8mfJQpAKXukIUE",
            authDomain: "alfa-mortgage.firebaseapp.com",
            projectId: "alfa-mortgage",
            storageBucket: "alfa-mortgage.firebasestorage.app",
            messagingSenderId: "529818641633",
            appId: "1:529818641633:web:fda65ff39acf954fe843a0",
            measurementId: "G-HS510VBJV7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const signupUrl = "{% url 'signup' %}";
        const otpUrl = "{% url 'signup_continue' %}";
        const firebaseSignupUrl = "{% url 'firebase_signup' %}";

        let draft = null;
        try {
            const raw = sessionStorage.getItem("signupDraft");
            draft = raw ? JSON.parse(raw) : null;
        } catch {
            draft = null;
        }

        if (!draft || !draft.email) {
            window.location.href = signupUrl;
        } else if (sessionStorage.getItem("signupOtpVerified") !== "1") {
            window.location.href = otpUrl;
        } else {

        const errorMsg = document.getElementById("errorMsg");
        const form = document.getElementById("createPasswordForm");
        const continueBtn = document.getElementById("continueBtn");
        const continueBtnText = document.getElementById("continueBtnText");
        const loadingSpinner = document.getElementById("loadingSpinner");
        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");

        const showError = (message) => {
            errorMsg.textContent = message;
            errorMsg.classList.add("visible");
        };

        const hideError = () => {
            errorMsg.textContent = "";
            errorMsg.classList.remove("visible");
        };

        const wireToggle = (buttonId, inputId) => {
            const btn = document.getElementById(buttonId);
            const input = document.getElementById(inputId);
            btn.addEventListener("click", () => {
                const show = input.type === "password";
                input.type = show ? "text" : "password";
                btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
            });
        };

        wireToggle("togglePassword", "password");
        wireToggle("toggleConfirmPassword", "confirmPassword");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();

            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (password.length < 6) {
                showError("Password must be at least 6 characters.");
                return;
            }

            if (password !== confirm) {
                showError("Passwords do not match.");
                return;
            }

            continueBtn.disabled = true;
            continueBtnText.textContent = "Creating account…";
            loadingSpinner.style.display = "inline-block";

            const displayName = [draft.firstName, draft.lastName].filter(Boolean).join(" ").trim() || draft.email;

            try {
                const credential = await createUserWithEmailAndPassword(auth, draft.email, password);
                if (displayName) {
                    await updateProfile(credential.user, { displayName });
                }
                const idToken = await credential.user.getIdToken();

                const response = await fetch(firebaseSignupUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ idToken })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.removeItem("signupDraft");
                    sessionStorage.removeItem("signupOtpVerified");
                    window.location.href = data.redirect_url || "/";
                    return;
                }

                showError(data.error || "Could not complete signup. Please try again.");
            } catch (err) {
                let msg = "Something went wrong. Please try again.";
                if (err.code === "auth/email-already-in-use") {
                    msg = "An account with this email already exists. Try logging in.";
                } else if (err.code === "auth/weak-password") {
                    msg = "Password is too weak. Choose a stronger password.";
                } else if (err.code === "auth/invalid-email") {
                    msg = "Invalid email. Go back and check your signup details.";
                } else if (err.code === "auth/network-request-failed") {
                    msg = "Network error. Check your connection and try again.";
                } else if (err.message) {
                    msg = err.message;
                }
                showError(msg);
            } finally {
                continueBtn.disabled = false;
                continueBtnText.textContent = "Continue";
                loadingSpinner.style.display = "none";
            }
        });

        }
    </script>
</body>
</html>
