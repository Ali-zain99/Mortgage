{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set up your credentials</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url("{% static 'images/baf.jfif' %}") no-repeat center center/cover;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.6);
            color: white;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="auth-card">

        <h3>Set up your credentials</h3>
        <p class="text-muted" style="font-size: 14px;">
            Please create an account or login
        </p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <!-- SIGNUP -->
        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}

            <input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>

            <button class="btn btn-danger w-100 mb-3">Sign Up</button>
        </form>

        <hr class="text-light">

        <!-- LOGIN -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>

            <button class="btn btn-outline-light w-100">Login</button>
        </form>

    </div>
</div>

</body>
</html>
