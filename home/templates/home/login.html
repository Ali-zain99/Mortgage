{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alfa Mortgage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-image: url("{% static 'images/auth_bg.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 20, 0.82);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(6px);
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: #e30613;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            margin-bottom: 1.5rem;
        }

        .auth-card h2 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .auth-card .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
        }

        .form-label {
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            display: block;
        }

        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 1.1rem;
            transition: border-color 0.2s;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .form-control:focus {
            outline: none;
            border-color: rgba(227, 6, 19, 0.7);
            background: rgba(255,255,255,0.1);
            color: #fff;
            box-shadow: none;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -0.6rem;
            margin-bottom: 1.1rem;
        }

        .forgot-row a {
            color: #e30613;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .forgot-row a:hover { text-decoration: underline; }

        .btn-login {
            background: #e30613;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 0.3rem;
            transition: background 0.2s;
        }

        .btn-login:hover { background: #c0040f; }

        .bottom-text {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.82rem;
            margin-top: 1.5rem;
        }

        .bottom-text a {
            color: #e30613;
            text-decoration: none;
            font-weight: 500;
        }

        .bottom-text a:hover { text-decoration: underline; }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.82rem;
            margin-bottom: 1rem;
            background: rgba(227, 6, 19, 0.1);
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            border: 1px solid rgba(227, 6, 19, 0.25);
        }
    </style>
</head>
<body>
    <div class="auth-card">
       <img src="{% static 'images/logo.png' %}" alt="BAF Logo" style="height: 48px; width: auto; margin-bottom: 1.5rem; display: block;">
        <h2>Welcome back</h2>
        <p class="subtitle">Login to your Alfa Mortgage account</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login_action' %}">
            {% csrf_token %}

            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter Email" required>

            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>

            <div class="forgot-row">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="bottom-text">
            New here? <a href="{% url 'signup' %}">Create an account</a>
        </p>
    </div>
</body>
</html>
