{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alfa Mortgage</title>
    <style>
        :root {
            --text-primary: #141519;
            --text-secondary: #6b6f80;
            --surface: #f2f2f4;
            --gradient: linear-gradient(59.305786deg, #000000 1.2128%, #d30248 42.838%, #d30202 84.464%, #d34802 105.28%);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ffffff;
            color: var(--text-primary);
            font-family: Tahoma, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .login-frame {
            width: 100%;
            max-width: 540px;
            padding: 50px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .login-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("{% static 'images/login-container-bg.png' %}");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.18;
            pointer-events: none;
        }

        .login-content {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .top-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .back-button {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            text-decoration: none;
            color: inherit;
        }

        .back-button img,
        .back-button svg {
            width: 32px;
            height: 32px;
            display: block;
        }

        .title {
            margin: 0;
            font-size: 32px;
            font-weight: 400;
            line-height: 40px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin: 0;
            font-size: 16px;
            font-weight: 400;
            line-height: 24px;
            letter-spacing: -0.5px;
        }

        .form-area {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .fields {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 16px;
            font-weight: 400;
            line-height: 24px;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .input-wrap {
            background: var(--surface);
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-wrap input {
            appearance: none;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font: inherit;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.25px;
            color: var(--text-primary);
        }

        .input-wrap input::placeholder {
            color: var(--text-secondary);
        }

        .icon-24 {
            position: relative;
            width: 24px;
            height: 24px;
            flex: 0 0 24px;
        }

        .icon-24 img,
        .icon-24 svg {
            display: block;
        }

        .toggle-visibility {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
        }

        .forgot-link {
            font-size: 16px;
            font-weight: 400;
            line-height: 24px;
            letter-spacing: -0.25px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ffffff;
            background: var(--gradient);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font: inherit;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
        }

        .login-button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 999px;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        .bottom-row {
            margin-top: 24px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            font-size: 16px;
            line-height: 24px;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        .signup-link {
            color: #d34802;
            text-decoration: none;
            letter-spacing: -0.25px;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .error-msg {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(211, 2, 2, 0.25);
            background: rgba(211, 2, 2, 0.06);
            color: #b00020;
            font-size: 14px;
            line-height: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 520px) {
            .login-frame { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <main class="login-frame">
        <div class="login-content">
            <div class="top-area">
                <a class="back-button" href="javascript:history.back()" aria-label="Go back">
                    <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                        <path d="M12.76 7.90667L4.66667 16L12.76 24.0933" stroke="#141519" stroke-width="2.13333" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M27.3333 16H4.89333" stroke="#141519" stroke-width="2.13333" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>

                <h1 class="title">Log in to your account</h1>
                <p class="subtitle">Enter your registered email or phone number and password to continue.</p>
            </div>

            <div id="errorMsg" class="error-msg" role="alert"></div>

            <form id="loginForm" class="form-area" novalidate>
                <div class="fields">
                    <div class="field">
                        <p class="label">Email idddd*</p>
                        <div class="input-wrap">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your email"
                                autocomplete="email"
                                required
                            >
                        </div>
                    </div>

                    <div class="field">
                        <p class="label">Password *</p>
                        <div class="input-wrap">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                            >

                            <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Toggle password visibility">
                                <span class="icon-24" aria-hidden="true">
                                    <img src="{% static 'images/login-tabler-icon.svg' %}" alt="" style="position:absolute; inset:0; width:100%; height:100%;">
                                    <img src="{% static 'images/login-vector-0.svg' %}" alt="" style="position:absolute; inset:41.66% 44.11% 44.11% 44.11%;">
                                    <img src="{% static 'images/login-vector-1.svg' %}" alt="" style="position:absolute; inset:25% 12.5% 25% 12.5%;">
                                    <img src="{% static 'images/login-vector-2.svg' %}" alt="" style="position:absolute; inset:12.5%;">
                                </span>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-row">
                        <a class="forgot-link" href="#">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="login-button">
                    <span style="display:flex; align-items:center;">
                        <span id="loginBtnText">Login</span>
                        <span class="loading-spinner" id="loadingSpinner" aria-hidden="true"></span>
                    </span>

                    <span class="icon-24" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" style="position:absolute; inset:0; width:100%; height:100%;">
                            <path d="M5 12H19" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M13 6L19 12L13 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </button>
            </form>

            <div class="bottom-row">
                <span>Don’t have an account?</span>
                <a class="signup-link" href="{% url 'signup' %}">Sign up</a>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        
        const firebaseConfig = {
            apiKey: "AIzaSyBbUovNi69LVu9IkmS1X8mfJQpAKXukIUE",
            authDomain: "alfa-mortgage.firebaseapp.com",
            projectId: "alfa-mortgage",
            storageBucket: "alfa-mortgage.firebasestorage.app",
            messagingSenderId: "529818641633",
            appId: "1:529818641633:web:fda65ff39acf954fe843a0",
            measurementId: "G-HS510VBJV7"
            };


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Get form elements
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword?.addEventListener('click', () => {
            if (!passwordInput) return;
            const current = passwordInput.getAttribute('type');
            passwordInput.setAttribute('type', current === 'password' ? 'text' : 'password');
        });

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Show loading state
            loginBtn.disabled = true;
            loginBtnText.textContent = 'Logging in...';
            loadingSpinner.style.display = 'inline-block';
            errorMsg.style.display = 'none';
            errorMsg.textContent = '';

            try {
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Get Firebase ID token
                const idToken = await user.getIdToken();

                // Send token to Django backend
                const response = await fetch('{% url "firebase_login" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        idToken: idToken,
                        email: email
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to appropriate page
                    window.location.href = data.redirect_url;
                } else {
                    throw new Error(data.error || 'Login failed');
                }

            } catch (error) {
                console.error('Login error:', error);
                
                // Show user-friendly error messages
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    errorMessage = 'Invalid email or password.';
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Please try again later.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your connection.';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                errorMsg.textContent = errorMessage;
                errorMsg.style.display = 'block';

                // Reset button state
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Login';
                loadingSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
